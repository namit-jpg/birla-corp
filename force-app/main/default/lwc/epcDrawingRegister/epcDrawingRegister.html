<template>
    <lightning-card icon-name="standard:document">
        <span slot="title">Drawing Register</span>
        <div slot="actions" class="slds-grid slds-gutters_xx-small">
            <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh} class="slds-m-right_xx-small"></lightning-button-icon>
            <lightning-button label="New Drawing" icon-name="utility:add" icon-position="left" variant="brand" onclick={handleNewDrawing}></lightning-button>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_error slds-m-bottom_small" role="alert"><span>{error}</span></div>
            </template>

            <!-- KPI strip -->
            <div class="slds-grid slds-gutters_xx-small slds-m-bottom_medium">
                <div class="slds-col kpi-card">
                    <div class="kpi-label">Total Drawings</div>
                    <div class="kpi-value">{totalCount}</div>
                </div>
                <div class="slds-col kpi-card kpi-approved">
                    <div class="kpi-label">Approved / IFC</div>
                    <div class="kpi-value">{ifcCount}</div>
                </div>
                <div class="slds-col kpi-card kpi-review">
                    <div class="kpi-label">For Review</div>
                    <div class="kpi-value">{reviewCount}</div>
                </div>
                <div class="slds-col kpi-card kpi-rejected">
                    <div class="kpi-label">Rejected</div>
                    <div class="kpi-value">{rejectedCount}</div>
                </div>
            </div>

            <!-- Discipline filters -->
            <div class="filter-row slds-m-bottom_x-small">
                <span class="filter-label">Discipline:</span>
                <template for:each={discButtons} for:item="btn">
                    <lightning-button
                        key={btn.value}
                        label={btn.label}
                        variant={btn.variant}
                        data-value={btn.value}
                        onclick={handleDiscFilter}
                        class="filter-btn">
                    </lightning-button>
                </template>
            </div>

            <!-- Status filters -->
            <div class="filter-row slds-m-bottom_small">
                <span class="filter-label">Status:</span>
                <template for:each={statusButtons} for:item="btn">
                    <lightning-button
                        key={btn.value}
                        label={btn.label}
                        variant={btn.variant}
                        data-value={btn.value}
                        onclick={handleStatusFilter}
                        class="filter-btn">
                    </lightning-button>
                </template>
            </div>

            <!-- Loading -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Loading drawings..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <p class="table-count">{countLabelText}</p>

                <template if:true={hasFilteredData}>
                    <div class="epc-datatable-wrap">
                        <lightning-datatable
                            key-field="Id"
                            data={filtered}
                            columns={columns}
                            hide-checkbox-column
                            column-widths-mode="auto"
                            min-column-width="80"
                            onrowaction={handleRowAction}>
                        </lightning-datatable>
                    </div>
                </template>

                <template if:false={hasFilteredData}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:file" size="small" alternative-text="No drawings"></lightning-icon>
                        <p class="empty-state-title">No drawings match the current filters</p>
                        <p class="empty-state-hint">Adjust discipline or status filters, or register a new drawing.</p>
                    </div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
