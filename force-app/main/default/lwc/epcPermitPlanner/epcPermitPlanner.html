<template>
    <lightning-card icon-name="standard:work_order">
        <span slot="title">Permit Planner</span>
        <div slot="actions" class="slds-grid slds-gutters_xx-small">
            <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh} class="slds-m-right_xx-small"></lightning-button-icon>
            <lightning-button label="New Permit" icon-name="utility:add" icon-position="left" variant="brand" onclick={handleNewPermit}></lightning-button>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_error slds-m-bottom_small" role="alert"><span>{error}</span></div>
            </template>

            <!-- KPI strip -->
            <div class="slds-grid slds-gutters_xx-small slds-m-bottom_medium">
                <div class="slds-col kpi-card kpi-active">
                    <div class="kpi-label">Active</div>
                    <div class="kpi-value">{activeCount}</div>
                </div>
                <div class="slds-col kpi-card kpi-pending">
                    <div class="kpi-label">Draft / Pending</div>
                    <div class="kpi-value">{pendingCount}</div>
                </div>
                <div class="slds-col kpi-card kpi-expiring">
                    <div class="kpi-label">Expiring (48h)</div>
                    <div class="kpi-value">{expiringCount}</div>
                </div>
                <div class="slds-col kpi-card kpi-expired">
                    <div class="kpi-label">Expired</div>
                    <div class="kpi-value">{expiredCount}</div>
                </div>
            </div>

            <template if:true={expiringCount}>
                <div class="expiring-alert slds-m-bottom_small">
                    <div class="slds-notify slds-notify_alert slds-theme_warning" role="alert">
                        <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <strong>{expiringCount} permit(s)</strong> expiring within 48 hours.
                    </div>
                    <div class="epc-datatable-wrap slds-m-top_x-small">
                        <lightning-datatable
                            key-field="Id"
                            data={expiringPermits}
                            columns={expiringColumns}
                            hide-checkbox-column
                            column-widths-mode="auto"
                            min-column-width="80">
                        </lightning-datatable>
                    </div>
                </div>
            </template>

            <!-- Status filters -->
            <div class="filter-row slds-m-bottom_x-small">
                <span class="filter-label">Status:</span>
                <template for:each={statusButtons} for:item="btn">
                    <lightning-button key={btn.value} label={btn.label} variant={btn.variant} data-value={btn.value} onclick={handleStatusFilter} class="filter-btn"></lightning-button>
                </template>
            </div>

            <!-- Type filters -->
            <div class="filter-row slds-m-bottom_small">
                <span class="filter-label">Type:</span>
                <template for:each={typeButtons} for:item="btn">
                    <lightning-button key={btn.value} label={btn.label} variant={btn.variant} data-value={btn.value} onclick={handleTypeFilter} class="filter-btn"></lightning-button>
                </template>
            </div>

            <!-- Loading -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Loading permits..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={filteredPermits.length}>
                    <div class="count-label">{permitCountLabel}</div>
                    <div class="epc-datatable-wrap">
                        <lightning-datatable
                            key-field="Id"
                            data={filteredPermits}
                            columns={columns}
                            hide-checkbox-column
                            column-widths-mode="auto"
                            min-column-width="80"
                            onrowaction={handleRowAction}>
                        </lightning-datatable>
                    </div>
                </template>

                <template if:false={filteredPermits.length}>
                    <div class="empty-state">
                        <lightning-icon icon-name="standard:work_order" size="large" alternative-text="No permits"></lightning-icon>
                        <h3 class="empty-title">No permits match the current filter</h3>
                        <p class="empty-msg">Adjust filters or create a new permit to work.</p>
                        <lightning-button label="New Permit" variant="brand" icon-name="utility:add" onclick={handleNewPermit} class="slds-m-top_small"></lightning-button>
                    </div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
