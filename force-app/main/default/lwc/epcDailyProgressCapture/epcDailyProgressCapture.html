<template>
    <lightning-card icon-name="standard:task">
        <span slot="title">Daily Progress</span>

        <div class="dpr-container">

            <!-- WBS Item selector -->
            <div class="selector-section">
                <lightning-record-picker
                    label="WBS Item"
                    placeholder="Search and select a WBS item..."
                    object-api-name="WBS_Item__c"
                    value={selectedWbsId}
                    onchange={handleWbsChange}>
                </lightning-record-picker>
            </div>

            <template if:true={isLoadingWbs}>
                <div class="loading-state">
                    <lightning-spinner alternative-text="Loading WBS details..." size="small"></lightning-spinner>
                    <p>Loading WBS item...</p>
                </div>
            </template>

            <!-- Main content -->
            <template if:true={hasWbs}>

                <!-- WBS Summary Card -->
                <div class="wp-summary-card">
                    <div class="wp-header">
                        <div class="wp-title">
                            <template if:true={wbsCode}><span class="wbs-code-badge">{wbsCode} &ndash;</span> </template>{wbsName}
                        </div>
                        <div class="wp-meta">
                            <span class="wp-stat">
                                <span class="stat-label">Complete</span>
                                <span class="stat-value">{wbsPercent}%</span>
                            </span>
                        </div>
                    </div>
                    <div class="progress-bar-track">
                        <div class={progressClass} style={progressBarStyle}></div>
                    </div>
                    <div class="rollup-note">Org rollup &mdash; live WBS % used by delay engine</div>
                </div>

                <!-- Form Section -->
                <div class="form-section">
                    <h3 class="section-title">Log Progress</h3>

                    <div class="form-grid">
                        <div class="form-group">
                            <lightning-input type="date" label="Date" value={formDate}
                                onchange={handleFieldChange} data-field="formDate" required></lightning-input>
                        </div>
                        <div class="form-group">
                            <lightning-combobox label="Weather" value={formWeather}
                                options={weatherOptions}
                                onchange={handleFieldChange} data-field="formWeather"
                                placeholder="Select..."></lightning-combobox>
                        </div>
                        <div class="form-group form-group--full">
                            <lightning-input type="number" label="% Complete (Today)" value={formPercentComplete}
                                onchange={handleFieldChange} data-field="formPercentComplete"
                                min="0" max="100" step="0.1" required
                                placeholder="0 – 100"></lightning-input>
                        </div>
                        <div class="form-group">
                            <lightning-input type="number" label="Hours Worked" value={formHoursWorked}
                                onchange={handleFieldChange} data-field="formHoursWorked"
                                min="0" step="0.5"></lightning-input>
                        </div>
                        <div class="form-group">
                            <lightning-input type="number" label="Crew Size" value={formCrewSize}
                                onchange={handleFieldChange} data-field="formCrewSize"
                                min="0"></lightning-input>
                        </div>
                        <div class="form-group">
                            <lightning-input type="number" label="Safety Incidents" value={formSafetyIncidents}
                                onchange={handleFieldChange} data-field="formSafetyIncidents"
                                min="0"></lightning-input>
                        </div>
                        <div class="form-group">
                            <lightning-input type="number" label="Quality Issues" value={formQualityIssues}
                                onchange={handleFieldChange} data-field="formQualityIssues"
                                min="0"></lightning-input>
                        </div>
                    </div>

                    <template if:true={errorMessage}>
                        <div class="error-banner">
                            <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                            <span>{errorMessage}</span>
                        </div>
                    </template>

                    <div class="button-group">
                        <lightning-button label="Reset" onclick={handleReset} class="btn-secondary"></lightning-button>
                        <lightning-button variant="brand" label={saveLabel} onclick={handleSave} disabled={isSaving} class="btn-primary"></lightning-button>
                    </div>
                </div>

                <!-- Recent Entries Section -->
                <div class="recent-section">
                    <div class="section-header">
                        <h3 class="section-title">Recent Entries</h3>
                        <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" size="small" onclick={handleRefreshRecent}></lightning-button-icon>
                    </div>

                    <template if:true={isLoadingRecent}>
                        <div class="loading-state">
                            <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
                        </div>
                    </template>

                    <template if:true={hasRecentRecords}>
                        <div class="recent-cards">
                            <template for:each={recentRecords} for:item="record">
                                <div key={record.Id} class="recent-card" onclick={handleCardClick} data-id={record.Id}>
                                    <div class="card-date">{record.Date__c}</div>
                                    <div class="card-stats">
                                        <div class="stat">
                                            <span class="label">% Complete</span>
                                            <span class="value">{record.Percent_Complete_Day__c}%</span>
                                        </div>
                                        <div class="stat">
                                            <span class="label">Hours</span>
                                            <span class="value">{record.Hours_Worked__c}</span>
                                        </div>
                                        <div class="stat">
                                            <span class="label">Crew</span>
                                            <span class="value">{record.Crew_Size__c}</span>
                                        </div>
                                        <div class="stat">
                                            <span class="label">Safety</span>
                                            <span class="value">{record.Safety_Incidents__c}</span>
                                        </div>
                                    </div>
                                    <div class="card-footer">
                                        <template if:true={record.Weather__c}>
                                            <span class="weather-badge">{record.Weather__c}</span>
                                        </template>
                                        <template if:true={record.Quality_Issues__c}>
                                            <span class="quality-flag">Quality issues: {record.Quality_Issues__c}</span>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template if:false={hasRecentRecords}>
                        <div class="empty-state">
                            <lightning-icon icon-name="standard:task" size="medium" alternative-text="No entries"></lightning-icon>
                            <p>No entries yet. Save your first DPR above.</p>
                        </div>
                    </template>
                </div>

            </template>

            <template if:false={hasWbs}>
                <div class="empty-state-large">
                    <lightning-icon icon-name="standard:work_order" size="large" alternative-text="Select WBS item"></lightning-icon>
                    <p>Select a WBS item above to view current progress and log daily entries.</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
